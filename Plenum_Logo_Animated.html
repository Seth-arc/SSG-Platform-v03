<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plenum — Seated Table, Animated</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,500;1,8..60,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16191d; --graphite-deep:#101317; --graphite:#1c2026;
    --paper:#fffefb; --canvas:#f6f4ee; --hair:#e2ddd0; --hair-strong:#cec9ba; --muted:#6e7178;
    --accent:#bd5a39; --accent-bright:#d67c58;
    --serif:'Source Serif 4', ui-serif, Georgia, serif;
    --sans:'Inter', ui-sans-serif, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:var(--sans); color:var(--ink); background:var(--canvas); min-height:100vh; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; align-items:center; gap:26px; padding:44px 24px; }

  .eyebrow{ font-size:.66rem; letter-spacing:.3em; text-transform:uppercase; color:var(--accent); font-weight:600; }

  /* ---- gradient defs holder ---- */
  .defs{ position:absolute; width:0; height:0; }

  /* ---- dual surface stages ---- */
  .stages{ display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
  .card{ border-radius:20px; padding:46px 60px; display:flex; flex-direction:column; align-items:center; gap:18px;
    min-width:300px; }
  .card.light{ background:var(--paper); color:var(--ink); border:1px solid var(--hair); }
  .card.dark{ background:radial-gradient(130% 130% at 50% 0%, #232830, var(--graphite-deep)); color:#f3f2ee; }
  .card .surface-tag{ font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; font-weight:600; opacity:.5; }

  svg.mark{ overflow:visible; }
  svg.mark circle, svg.mark g{ transform-box:fill-box; transform-origin:center; }
  .tabletop{ fill:url(#tableGlow); }
  .edge{ fill:none; stroke:currentColor; stroke-width:1.1; opacity:.3; }
  .seat{ fill:currentColor; }
  .matter{ fill:var(--accent); }
  .matter-halo{ fill:var(--accent); opacity:0; }
  .ripple{ fill:none; stroke:var(--accent); stroke-width:1.2; opacity:0; }

  .wordmark{ font-family:var(--serif); font-weight:500; font-size:2.4rem; letter-spacing:-.03em; }
  .wordmark .dot{ color:var(--accent); }

  /* ===== AMBIENT (always) ===== */
  .markroot{ animation:breathe 7s ease-in-out infinite; }

  /* ===== CONVENE — the table assembles ===== */
  .stages.anim-convene .tabletop{ animation:tableIn .6s ease both; }
  .stages.anim-convene .edge{ animation:ringDraw .75s cubic-bezier(.4,0,.2,1) both .2s; }
  .stages.anim-convene .seat{ animation:seatIn .5s cubic-bezier(.22,.68,.28,1) both; animation-delay:var(--d); }
  .stages.anim-convene .matter{ animation:matterIn .6s cubic-bezier(.2,.7,.3,1.35) both 1.18s; }
  .stages.anim-convene .matter-halo{ animation:haloIn .9s ease both 1.18s; }
  .stages.anim-convene .ripple.r1{ animation:ripple 1.5s ease-out both 1.2s; }
  .stages.anim-convene .wordmark{ animation:wordIn .8s cubic-bezier(.2,.7,.2,1) both 1.5s; }

  /* ===== DELIBERATE — the floor goes around the table ===== */
  .stages.deliberate .seat{ animation:around 5s ease-in-out infinite; animation-delay:calc(var(--o) * 0.5s); }
  .stages.deliberate .matter-halo{ animation:haloBreath 3.4s ease-in-out infinite; }

  /* ===== DECIDE — radiate from the matter, the room reacts ===== */
  .stages.decide .matter{ animation:matterBeat 1.6s ease-in-out infinite; }
  .stages.decide .matter-halo{ animation:haloBreath 1.6s ease-in-out infinite; }
  .stages.decide .seat{ animation:reactPulse 1.6s ease-in-out infinite; }
  .stages.decide .ripple.r1{ animation:ripple 2.3s ease-out infinite; }
  .stages.decide .ripple.r2{ animation:ripple 2.3s ease-out infinite 1.15s; }

  @keyframes breathe{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.014)} }
  @keyframes tableIn{ 0%{opacity:0; transform:scale(.4)} 100%{opacity:1; transform:scale(1)} }
  @keyframes ringDraw{ 0%{stroke-dashoffset:91.2; opacity:0} 30%{opacity:.3} 100%{stroke-dashoffset:0; opacity:.3} }
  @keyframes seatIn{ 0%{opacity:0; transform:scale(.2)} 62%{opacity:1; transform:scale(1.18)} 100%{opacity:1; transform:scale(1)} }
  @keyframes matterIn{ 0%{opacity:0; transform:scale(0)} 70%{opacity:1; transform:scale(1.3)} 100%{opacity:1; transform:scale(1)} }
  @keyframes haloIn{ 0%{opacity:0; transform:scale(.5)} 100%{opacity:.16; transform:scale(1)} }
  @keyframes haloBreath{ 0%,100%{opacity:.12; transform:scale(.85)} 50%{opacity:.32; transform:scale(1.18)} }
  @keyframes around{ 0%,100%{ fill:currentColor; transform:scale(1)} 8%{ fill:var(--accent-bright); transform:scale(1.32)} 18%{ fill:currentColor; transform:scale(1)} }
  @keyframes matterBeat{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.28)} }
  @keyframes reactPulse{ 0%,100%{opacity:1} 50%{opacity:.5} }
  @keyframes ripple{ 0%{opacity:.5; transform:scale(.12)} 70%{opacity:0} 100%{opacity:0; transform:scale(1.05)} }
  @keyframes wordIn{ 0%{opacity:0; transform:translateY(14px)} 100%{opacity:1; transform:translateY(0)} }

  @media (prefers-reduced-motion: reduce){
    .markroot,.tabletop,.edge,.seat,.matter,.matter-halo,.ripple,.wordmark{ animation:none !important; }
    .edge{ stroke-dashoffset:0; }
    .tabletop,.seat,.matter,.wordmark{ opacity:1 !important; transform:none !important; }
    .matter-halo{ opacity:.14 !important; transform:none !important; }
    .ripple{ display:none; }
  }

  /* ---- controls ---- */
  .controls{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
  .ctl{ font-family:var(--sans); font-size:.8rem; font-weight:600; color:var(--ink); background:var(--paper);
    border:1px solid var(--hair-strong); border-radius:9px; padding:9px 17px; cursor:pointer; transition:.16s ease; }
  .ctl:hover{ border-color:var(--ink); }
  .ctl.on{ background:var(--ink); border-color:var(--ink); color:#fff; }
  .accents{ display:flex; gap:10px; align-items:center; }
  .accents .lbl{ font-size:.64rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); }
  .adot{ width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:.14s ease; }
  .adot:hover{ transform:scale(1.12); } .adot.sel{ border-color:var(--ink); }

  /* ---- scale proof on both surfaces ---- */
  .proof{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .strip{ display:flex; align-items:flex-end; gap:24px; padding:20px 26px; border-radius:14px; }
  .strip.light{ background:var(--paper); color:var(--ink); border:1px solid var(--hair); }
  .strip.dark{ background:var(--graphite-deep); color:#f3f2ee; }
  .strip .sp{ display:flex; flex-direction:column; align-items:center; gap:7px; }
  .strip .sz{ font-size:.58rem; letter-spacing:.12em; text-transform:uppercase; opacity:.5; }
  .hint{ font-family:var(--serif); font-style:italic; font-size:.92rem; color:var(--muted); }
</style>
</head>
<body>

  <!-- shared gradient: a soft accent glow that works on light AND dark -->
  <svg class="defs" aria-hidden="true">
    <defs>
      <radialGradient id="tableGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.24"/>
        <stop offset="68%" stop-color="var(--accent)" stop-opacity="0.09"/>
        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
      </radialGradient>
    </defs>
  </svg>

  <div class="eyebrow">Plenum · Seated Table</div>

  <div class="stages anim-convene" id="stages">

    <!-- LIGHT SURFACE -->
    <div class="card light">
      <span class="surface-tag">On light</span>
      <svg class="mark" width="150" height="150" viewBox="0 0 80 80" role="img" aria-label="Plenum mark">
        <g class="markroot">
          <circle class="ripple r1" cx="40" cy="40" r="22"/>
          <circle class="ripple r2" cx="40" cy="40" r="22"/>
          <circle class="tabletop" cx="40" cy="40" r="14.5"/>
          <circle class="edge" cx="40" cy="40" r="14.5" stroke-dasharray="91.2" transform="rotate(-90 40 40)"/>
          <circle class="matter-halo" cx="40" cy="40" r="7"/>
          <circle class="matter" cx="40" cy="40" r="3"/>
          <g class="seatring">
            <circle class="seat" cx="40"    cy="16"    r="2.3" style="--d:.55s; --o:0"/>
            <circle class="seat" cx="54.11" cy="20.58" r="2.3" style="--d:.605s; --o:1"/>
            <circle class="seat" cx="62.82" cy="32.58" r="2.3" style="--d:.66s; --o:2"/>
            <circle class="seat" cx="62.82" cy="47.42" r="2.3" style="--d:.715s; --o:3"/>
            <circle class="seat" cx="54.11" cy="59.42" r="2.3" style="--d:.77s; --o:4"/>
            <circle class="seat" cx="40"    cy="64"    r="2.3" style="--d:.825s; --o:5"/>
            <circle class="seat" cx="25.89" cy="59.42" r="2.3" style="--d:.88s; --o:6"/>
            <circle class="seat" cx="17.18" cy="47.42" r="2.3" style="--d:.935s; --o:7"/>
            <circle class="seat" cx="17.18" cy="32.58" r="2.3" style="--d:.99s; --o:8"/>
            <circle class="seat" cx="25.89" cy="20.58" r="2.3" style="--d:1.045s; --o:9"/>
          </g>
        </g>
      </svg>
      <div class="wordmark">Plenum<span class="dot">.</span></div>
    </div>

    <!-- DARK SURFACE -->
    <div class="card dark">
      <span class="surface-tag">On dark</span>
      <svg class="mark" width="150" height="150" viewBox="0 0 80 80" role="img" aria-label="Plenum mark">
        <g class="markroot">
          <circle class="ripple r1" cx="40" cy="40" r="22"/>
          <circle class="ripple r2" cx="40" cy="40" r="22"/>
          <circle class="tabletop" cx="40" cy="40" r="14.5"/>
          <circle class="edge" cx="40" cy="40" r="14.5" stroke-dasharray="91.2" transform="rotate(-90 40 40)"/>
          <circle class="matter-halo" cx="40" cy="40" r="7"/>
          <circle class="matter" cx="40" cy="40" r="3"/>
          <g class="seatring">
            <circle class="seat" cx="40"    cy="16"    r="2.3" style="--d:.55s; --o:0"/>
            <circle class="seat" cx="54.11" cy="20.58" r="2.3" style="--d:.605s; --o:1"/>
            <circle class="seat" cx="62.82" cy="32.58" r="2.3" style="--d:.66s; --o:2"/>
            <circle class="seat" cx="62.82" cy="47.42" r="2.3" style="--d:.715s; --o:3"/>
            <circle class="seat" cx="54.11" cy="59.42" r="2.3" style="--d:.77s; --o:4"/>
            <circle class="seat" cx="40"    cy="64"    r="2.3" style="--d:.825s; --o:5"/>
            <circle class="seat" cx="25.89" cy="59.42" r="2.3" style="--d:.88s; --o:6"/>
            <circle class="seat" cx="17.18" cy="47.42" r="2.3" style="--d:.935s; --o:7"/>
            <circle class="seat" cx="17.18" cy="32.58" r="2.3" style="--d:.99s; --o:8"/>
            <circle class="seat" cx="25.89" cy="20.58" r="2.3" style="--d:1.045s; --o:9"/>
          </g>
        </g>
      </svg>
      <div class="wordmark">Plenum<span class="dot">.</span></div>
    </div>

  </div>

  <div class="controls">
    <button class="ctl" id="btnConvene">▶ Convene</button>
    <button class="ctl" id="btnDeliberate">Deliberate</button>
    <button class="ctl" id="btnDecide">Decide</button>
  </div>

  <div class="accents">
    <span class="lbl">Accent</span>
    <span class="adot sel" style="background:#bd5a39" data-a="#bd5a39" data-b="#d67c58"></span>
    <span class="adot" style="background:#115740" data-a="#115740" data-b="#3f8466"></span>
    <span class="adot" style="background:#274472" data-a="#274472" data-b="#4a6aa0"></span>
    <span class="adot" style="background:#8c2f39" data-a="#8c2f39" data-b="#b1505a"></span>
    <span class="adot" style="background:#1f6f73" data-a="#1f6f73" data-b="#3f9498"></span>
    <span class="adot" style="background:#5b4b8a" data-a="#5b4b8a" data-b="#7e6cb0"></span>
  </div>

  <div class="proof">
    <div class="strip light">
      <div class="sp">
        <svg width="56" height="56" viewBox="0 0 80 80"><circle class="tabletop" cx="40" cy="40" r="14.5"/><circle class="edge" cx="40" cy="40" r="14.5"/><circle class="matter" cx="40" cy="40" r="3"/><g fill="currentColor"><circle cx="40" cy="16" r="2.3"/><circle cx="54.11" cy="20.58" r="2.3"/><circle cx="62.82" cy="32.58" r="2.3"/><circle cx="62.82" cy="47.42" r="2.3"/><circle cx="54.11" cy="59.42" r="2.3"/><circle cx="40" cy="64" r="2.3"/><circle cx="25.89" cy="59.42" r="2.3"/><circle cx="17.18" cy="47.42" r="2.3"/><circle cx="17.18" cy="32.58" r="2.3"/><circle cx="25.89" cy="20.58" r="2.3"/></g></svg>
        <span class="sz">56</span>
      </div>
      <div class="sp">
        <svg width="30" height="30" viewBox="0 0 80 80"><circle class="matter" cx="40" cy="40" r="4.5"/><g fill="currentColor"><circle cx="40" cy="17" r="3"/><circle cx="56.3" cy="23.7" r="3"/><circle cx="63" cy="40" r="3"/><circle cx="56.3" cy="56.3" r="3"/><circle cx="40" cy="63" r="3"/><circle cx="23.7" cy="56.3" r="3"/><circle cx="17" cy="40" r="3"/><circle cx="23.7" cy="23.7" r="3"/></g></svg>
        <span class="sz">30</span>
      </div>
      <div class="sp">
        <svg width="18" height="18" viewBox="0 0 80 80"><circle class="matter" cx="40" cy="40" r="7"/><g fill="currentColor"><circle cx="40" cy="18" r="4.5"/><circle cx="60.78" cy="28" r="4.5"/><circle cx="60.78" cy="52" r="4.5"/><circle cx="40" cy="62" r="4.5"/><circle cx="19.22" cy="52" r="4.5"/><circle cx="19.22" cy="28" r="4.5"/></g></svg>
        <span class="sz">fav</span>
      </div>
    </div>
    <div class="strip dark">
      <div class="sp">
        <svg width="56" height="56" viewBox="0 0 80 80"><circle class="tabletop" cx="40" cy="40" r="14.5"/><circle class="edge" cx="40" cy="40" r="14.5"/><circle class="matter" cx="40" cy="40" r="3"/><g fill="currentColor"><circle cx="40" cy="16" r="2.3"/><circle cx="54.11" cy="20.58" r="2.3"/><circle cx="62.82" cy="32.58" r="2.3"/><circle cx="62.82" cy="47.42" r="2.3"/><circle cx="54.11" cy="59.42" r="2.3"/><circle cx="40" cy="64" r="2.3"/><circle cx="25.89" cy="59.42" r="2.3"/><circle cx="17.18" cy="47.42" r="2.3"/><circle cx="17.18" cy="32.58" r="2.3"/><circle cx="25.89" cy="20.58" r="2.3"/></g></svg>
        <span class="sz">56</span>
      </div>
      <div class="sp">
        <svg width="30" height="30" viewBox="0 0 80 80"><circle class="matter" cx="40" cy="40" r="4.5"/><g fill="currentColor"><circle cx="40" cy="17" r="3"/><circle cx="56.3" cy="23.7" r="3"/><circle cx="63" cy="40" r="3"/><circle cx="56.3" cy="56.3" r="3"/><circle cx="40" cy="63" r="3"/><circle cx="23.7" cy="56.3" r="3"/><circle cx="17" cy="40" r="3"/><circle cx="23.7" cy="23.7" r="3"/></g></svg>
        <span class="sz">30</span>
      </div>
      <div class="sp">
        <svg width="18" height="18" viewBox="0 0 80 80"><circle class="matter" cx="40" cy="40" r="7"/><g fill="currentColor"><circle cx="40" cy="18" r="4.5"/><circle cx="60.78" cy="28" r="4.5"/><circle cx="60.78" cy="52" r="4.5"/><circle cx="40" cy="62" r="4.5"/><circle cx="19.22" cy="52" r="4.5"/><circle cx="19.22" cy="28" r="4.5"/></g></svg>
        <span class="sz">fav</span>
      </div>
    </div>
  </div>

  <div class="hint">Convene replays the assembly · Deliberate &amp; Decide are ambient modes</div>

<script>
  var stages = document.getElementById('stages'), root = document.documentElement;
  var bC = document.getElementById('btnConvene'), bDel = document.getElementById('btnDeliberate'), bDec = document.getElementById('btnDecide');
  function setMode(mode){
    stages.classList.remove('anim-convene','deliberate','decide');
    bDel.classList.toggle('on', mode === 'deliberate');
    bDec.classList.toggle('on', mode === 'decide');
    if(mode){ void stages.offsetWidth; stages.classList.add(mode); }
  }
  bC.addEventListener('click', function(){ setMode(); void stages.offsetWidth; stages.classList.add('anim-convene'); });
  bDel.addEventListener('click', function(){ setMode(stages.classList.contains('deliberate') ? null : 'deliberate'); });
  bDec.addEventListener('click', function(){ setMode(stages.classList.contains('decide') ? null : 'decide'); });
  document.querySelectorAll('.adot').forEach(function(dot){
    dot.addEventListener('click', function(){
      root.style.setProperty('--accent', dot.dataset.a); root.style.setProperty('--accent-bright', dot.dataset.b);
      document.querySelectorAll('.adot').forEach(function(d){ d.classList.remove('sel'); }); dot.classList.add('sel');
    });
  });
</script>

</body>
</html>
