<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plenum — Animated Logo</title>
<style>
  /* Base setup using the brand's dark mode variables */
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #101317; /* --graphite-deep */
    color: #f3f2ee;
    overflow: hidden;
  }

  .logo-container {
    width: 250px;
    height: 250px;
    position: relative;
    cursor: pointer;
  }

  .mark {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* Core pulsing animation */
  .core {
    fill: #bd5a39; /* --accent (Ember) */
    animation: pulse 4s infinite ease-in-out;
    transform-origin: 40px 40px;
  }

  /* Inner ring slow clockwise rotation */
  .inner-ring {
    animation: spin 24s linear infinite;
    transform-origin: 40px 40px;
    transition: animation-duration 0.5s ease;
  }

  /* Outer ring slower counter-clockwise rotation */
  .outer-ring {
    animation: spin-reverse 40s linear infinite;
    transform-origin: 40px 40px;
    transition: animation-duration 0.5s ease;
  }

  /* Speed up the rings on hover to simulate active deliberation */
  .logo-container:hover .inner-ring {
    animation-duration: 8s;
  }
  .logo-container:hover .outer-ring {
    animation-duration: 12s;
  }
  .logo-container:hover .core {
    animation-duration: 1.5s;
  }

  /* Keyframes */
  @keyframes spin {
    100% { transform: rotate(360deg); }
  }

  @keyframes spin-reverse {
    100% { transform: rotate(-360deg); }
  }

  @keyframes pulse {
    0%, 100% { 
      transform: scale(1); 
      filter: drop-shadow(0 0 4px rgba(189, 90, 57, 0.4)); 
    }
    50% { 
      transform: scale(1.15); 
      filter: drop-shadow(0 0 12px rgba(189, 90, 57, 0.8)); 
    }
  }
</style>
</head>
<body>

<div class="logo-container" aria-label="Animated Plenum Logo">
  <svg class="mark" viewBox="0 0 80 80" role="img">
    
    <circle class="core" cx="40" cy="40" r="4.6"/>
    
    <g class="inner-ring" fill="currentColor">
      <circle cx="40" cy="22" r="2.2"/>
      <circle cx="55.6" cy="31" r="2.2"/>
      <circle cx="55.6" cy="49" r="2.2"/>
      <circle cx="40" cy="58" r="2.2"/>
      <circle cx="24.4" cy="49" r="2.2"/>
      <circle cx="24.4" cy="31" r="2.2"/>
    </g>
    
    <g class="outer-ring" fill="currentColor" opacity=".55">
      <circle cx="40" cy="9" r="2"/>
      <circle cx="55.5" cy="13.2" r="2"/>
      <circle cx="66.8" cy="24.5" r="2"/>
      <circle cx="71" cy="40" r="2"/>
      <circle cx="66.8" cy="55.5" r="2"/>
      <circle cx="55.5" cy="66.8" r="2"/>
      <circle cx="40" cy="71" r="2"/>
      <circle cx="24.5" cy="66.8" r="2"/>
      <circle cx="13.2" cy="55.5" r="2"/>
      <circle cx="9" cy="40" r="2"/>
      <circle cx="13.2" cy="24.5" r="2"/>
      <circle cx="24.5" cy="13.2" r="2"/>
    </g>

  </svg>
</div>

</body>
</html>
